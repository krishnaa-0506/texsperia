[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[dev]
  functionsTimeout = 300000

# Environment variables should be set in Netlify UI, not in this file (security best practice)
# Go to Site Settings > Build & deploy > Environment Variables and add:
# - MONGODB_URI
# - MONGODB_DB_NAME
# - ADMIN_PASSWORD
# - IMAGEKIT_PRIVATE_KEY
# - IMAGEKIT_PUBLIC_KEY
# - IMAGEKIT_URL_ENDPOINT

[build.environment]
# Exclude package files from secrets scanning since project name "texperia-2026"
# naturally contains the database name value, which could trigger false positives
SECRETS_SCAN_OMIT_PATHS = "package.json,package-lock.json"
